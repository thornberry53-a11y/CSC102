<!DOCTYPE html> <!-- Declares this as an HTML5 document -->
<html lang="en"> <!-- Root element of the page -->
<head>
    <meta charset="UTF-8"> <!-- Sets character encoding -->
    <title>Meme & Palindrome Project</title> <!-- Tab title -->
    <link rel="stylesheet" href="edp.css"> <!-- Links external CSS file -->
</head>
<body>
    <h1>Meme Movement Controller</h1> <!-- Main page heading -->

    <!-- Form for Meme Controls to satisfy 'use form' requirement -->
    <form id="memeForm"> 
        <button type="button" id="startBtn">Start Moving</button> <!-- Button to begin animation -->
        <button type="button" id="stopBtn">Stop Moving</button> <!-- Button to halt animation -->
    </form>

    <!-- Form for Palindrome input to satisfy 'submit for all input' requirement -->
    <form id="palinForm">
        <input type="text" id="palinInput" placeholder="Enter word..."> <!-- Input field for text -->
        <button type="submit" id="submitBtn">Check Palindrome</button> <!-- Submit button for form -->
    </form>

    <!-- Area where validation and results are shown using innerHTML -->
    <div id="msgArea"></div> 

    <!-- The meme image that will move around the screen -->
    <img id="memeImage" src="catchme.png" alt="Meme Image"> 

    <script src="edp.js"></script> <!-- Links the JavaScript logic at the end of body -->
</body>
</html>
