<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palindrome & Movement</title>
    <link rel="stylesheet" href="LandingPage.css">
</head>
<body>
    <a href="LandingPage.html">Return to Hub</a>

        <form id="palinForm">
            <label for="palInput">Palindrome Checker</label>
            <input type="text" id="palInput" placeholder="Enter word or phrase" required>

        </form>
        <div class="controls">
            <button id="startBtn">Start Move</button>
            <button id="stopBtn">Stop Move</button>
        </div>
        <div id="msgArea">Results will appear here</div>
        <img id="memeImage" src="catchme.png" alt="Meme Image" style="position: absolute; left: 0px; width: 250px; top: 450px; z-index: -1;">
