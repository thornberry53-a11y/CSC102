<!-- Gary Thornberry --> 
<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Palindrome & Movement</title> 
    <link rel="stylesheet" href="edp.css"> 
</head> 
<body> 
    <!-- Added input field inside the form to replace prompt pop-ups -->
    <form id="palinForm" onsubmit="checkPalindrome(event)"> 
        <input type="text" id="palInput" placeholder="Enter word or phrase">
        <button type="submit" id="submitBtn">Check Palindrome</button> 
    </form> 

    <div class="controls"> 
        <button id="startBtn" onclick="handleStartClick()">Start Move</button> 
        <button id="stopBtn" onclick="handleStopClick()">Stop Move</button> 
    </div> 

    <img id="memeImage" src="catchme.png" alt="Meme Image"> 
    <script src="edp.js"></script> 
    <div id="msgArea">Results will appear here</div> 
</body> 
</html>
