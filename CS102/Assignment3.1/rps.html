<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RPS Game</title>
    <!-- link my css and js files -->
    <link rel="stylesheet" href="rps.css">
    <script src="rps.js" defer></script> 
</head>
<body>
    <h1>Rock Paper Scissors</h1>
    
    <!-- main logo from the folder -->
    <img id="rps" src="rock.png" height="250">
    <br><br>

    <!-- button to start the game function -->
    <button onclick="RPS()">Play Rock Paper Scissors</button>

    <div class="game-container">
        <!-- player 1 start image -->
        <div class="player-box">
            <h3>Player 1</h3>
            <img id="player1Image" width="150px" height="150px" src="player1Image.jpg" />
        </div>

        <!-- player 2 start image -->
        <div class="player-box">
            <h3>Player 2</h3>
            <img id="player2Image" width="150px" height="150px" src="player2Image.jpg" />
        </div>
    </div>

    <!-- text for the winner -->
    <div id="result">Result goes here...</div>
</body>
</html>
