<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Variables & Booleans</title>
    <!-- This links your HTML to your JavaScript file -->
    <script src="global.js"></script>
</head>
<body>


    <!-- Counter Buttons -->
    <button onclick="plusOne()">Add One</button>
    <button onclick="plusTwo()">Add Two</button>

    <br><br>

    <!-- Boolean Toggle Buttons -->
    <button onclick="boolon()">Set Boolean to TRUE</button>
    <button onclick="booloff()">Set Boolean to FALSE</button>
    
    <br><br>

    <!-- This button triggers the status update -->
    <button onclick="boolstatus()">Check Boolean Status</button>

    <hr>

    <!-- This is where all the text will appear -->
    <p id="counter">Current status will show up here...</p>

</body>
</html>
