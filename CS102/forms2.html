<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="forms2.js"></script>
    <title>Forms 2</title>
</head>
<body>
    <h1>Forms With Req New Types</h1>
    <form id="registration" onsubmit="return false">
        Event Name: <input type="text" id="eventName" required minlength="3" maxlength="20" />
        Email: <input type="email" id="email" required />
        Event Date: <input type="date" id="eventDate" required />
        <button type="submit" onclick="validate()">Register</button>
    </form>

    <h1>Patterns</h1>
    <form id="patterns" onsubmit="return false">
        Username: <input type="text" id="username" required pattern="[A-Za-z0-9]{5,15}" title="5 to 15 alphanumeric characters" />
        Class Code (3caps, 3nums): <input type="text" id="classCode" required pattern="[A-Z]{3}[0-9]{3}" title="3 uppercase letters followed by 3 numbers" />
        website: <input type="url" id="website" required pattern="https?://.+\.com" title="Please enter a valid website URL"/>
        <button type="submit" onclick="validatePatterns()">Submit</button>
    </form>
</body>
</html>
